name: Collect RSS

on:
  schedule:
    # Every 2 hours — stays well within the 2000 min/month free tier
    - cron: "0 */2 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run collector
        run: node scripts/collect.js

      - name: Commit new data
        run: |
          git config user.name  "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add data/
          # Only commit if something changed
          git diff --cached --quiet || git commit -m "collect: $(date -u +'%Y-%m-%dT%H:%M')Z"
          git push
